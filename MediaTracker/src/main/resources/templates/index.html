<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Media Tracker 🍿</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body {
           background-color: #0b0b0b; /* Negru intens */
           color: #f1f1f1;
           font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
           padding: 50px 0;
        }

        h1, h2 {
            color: #d4af37; /* Auriu clasic */
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            }

        .btn-gold {
             background-color: #d4af37;
              color: #000;
              border: none;
              font-weight: bold;
              transition: all 0.3s ease;
        }

        .btn-gold:hover {
            background-color: #f1c40f;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }

        .movie-card {
            background: rgba(30, 30, 30, 0.6);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid #d4af37; /* Contur auriu */
            transition: transform 0.3s ease;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            background: rgba(40, 40, 40, 0.9);
        }

        .rating-badge {
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            color: black;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        hr {
            border-top: 2px solid #d4af37;
            opacity: 0.3;
        }
    </style>
</head>
<body>
<div class="container text-center">
    <h1 class="mb-4">Ce gen vrei să urmărești azi?</h1>

    <div class="d-flex justify-content-center gap-4 mb-5">
        <form th:action="@{/setup}" method="post">
            <input type="hidden" name="genre" value="28">
            <button type="submit" class="btn btn-gold btn-lg">🍿 ACȚIUNE</button>
        </form>
        <form th:action="@{/setup}" method="post">
            <input type="hidden" name="genre" value="35">
            <button type="submit" class="btn btn-gold btn-lg">🎭 COMEDIE</button>
        </form>
        <form th:action="@{/setup}" method="post">
            <input type="hidden" name="genre" value="27">
            <button type="submit" class="btn btn-gold btn-lg">💀 HORROR</button>
        </form>
    </div>

    <hr>

    <h2 class="mt-5 mb-4">Lista ta de recomandări</h2>
    <div class="row">
        <div th:each="m : ${mediaList}" class="col-md-4">
            <div class="movie-card">
                <h5 th:text="${m.title}">Titlu Film</h5>
                <p>Tip: <span th:text="${m.type}">Movie</span></p>
                <span class="rating-badge" th:text="${m.rating} + '/10'">8/10</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
